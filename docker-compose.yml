services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: claude_user
      POSTGRES_PASSWORD: claude_pass
      POSTGRES_DB: claude_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U claude_user -d claude_dev']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
